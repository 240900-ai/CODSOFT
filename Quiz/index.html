<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quiz Game</title>

<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:800px;
background:#1e293b;
padding:25px;
border-radius:15px;
}

.progress{
height:12px;
background:#334155;
border-radius:20px;
overflow:hidden;
margin:15px 0;
}

.bar{
height:100%;
width:0%;
background:lime;
}

.option{
background:#334155;
padding:12px;
margin:10px 0;
border-radius:8px;
cursor:pointer;
}

.option:hover{
background:#475569;
}

.selected{
background:#0ea5e9;
}

button{
padding:10px 20px;
margin:10px 5px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
}

.prev{background:gray;}
.next{background:green;}
.submit{background:red;}
.restart{background:orange;}

input[type=text]{
width:100%;
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
}

#result{
display:none;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h1>Quiz Game</h1>

<div>
Question <span id="count">1</span>/10
<span style="float:right">⏳ <span id="timer">120</span>s</span>
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="quiz">

<h2 id="question"></h2>

<div id="options"></div>

<button class="prev" onclick="prevQuestion()">Previous</button>
<button class="next" onclick="nextQuestion()">Next</button>
<button class="submit" onclick="showResult()">Submit Quiz</button>

</div>

<div id="result">
<h2>Quiz Completed</h2>
<h3 id="score"></h3>
<button class="restart" onclick="restartQuiz()">Restart</button>
</div>

</div>

<script>

const quizData=[

{
type:"single",
question:"Which language is used for web page structure?",
options:["Python","HTML","Java","C++"],
answer:1
},

{
type:"single",
question:"Which CSS property changes text color?",
options:["font-size","background","color","border"],
answer:2
},

{
type:"single",
question:"Which company developed JavaScript?",
options:["Google","Netscape","Microsoft","Apple"],
answer:1
},

{
type:"single",
question:"What does CSS stand for?",
options:["Creative Style Sheets","Cascading Style Sheets","Computer Style Sheets","Colorful Style Sheets"],
answer:1
},

{
type:"single",
question:"Which keyword declares a variable in JavaScript?",
options:["int","var","declare","new"],
answer:1
},

{
type:"single",
question:"Which HTML tag creates a hyperlink?",
options:["<link>","<a>","<href>","<url>"],
answer:1
},

{
type:"single",
question:"Which method prints output in browser console?",
options:["console.print()","console.log()","print()","log.console()"],
answer:1
},

{
type:"single",
question:"Which symbol is used for ID selector in CSS?",
options:[".","#","*","@"],
answer:1
},

{
type:"fill",
question:"Fill in the blank: HTML stands for ______ Markup Language.",
answer:"HyperText"
},

{
type:"multi",
question:"Which are JavaScript frameworks?",
options:["React","Angular","Laravel","Vue"],
answer:[0,1,3]
}

];

let current=0;
let answers=[];
let timer=120;

function loadQuestion(){

let q=quizData[current];

document.getElementById("count").innerText=current+1;

document.getElementById("bar").style.width=
((current)/quizData.length)*100+"%";

document.getElementById("question").innerText=q.question;

let options=document.getElementById("options");
options.innerHTML="";

if(q.type==="single"){

q.options.forEach((op,i)=>{

let div=document.createElement("div");

div.className="option";

div.textContent=op;

if(answers[current]===i)
div.classList.add("selected");

div.onclick=function(){

answers[current]=i;

document.querySelectorAll(".option")
.forEach(x=>x.classList.remove("selected"));

div.classList.add("selected");

};

options.appendChild(div);

});

}

else if(q.type==="fill"){

options.innerHTML=
`<input type="text" id="fill"
value="${answers[current]||''}"
placeholder="Type answer">`;

}

else if(q.type==="multi"){

let selected=answers[current]||[];

q.options.forEach((op,i)=>{

options.innerHTML+=`
<div class="option">
<label>
<input type="checkbox" value="${i}"
${selected.includes(i)?"checked":""}>
${op}
</label>
</div>`;
});

}

}

function saveAnswer(){

let q=quizData[current];

if(q.type==="fill"){

let box=document.getElementById("fill");

if(box)
answers[current]=box.value;

}

if(q.type==="multi"){

let arr=[];

document.querySelectorAll("input[type=checkbox]")
.forEach(cb=>{
if(cb.checked)
arr.push(Number(cb.value));
});

answers[current]=arr.sort();

}

}

function nextQuestion(){

saveAnswer();

if(current<quizData.length-1){

current++;
loadQuestion();

}

}

function prevQuestion(){

saveAnswer();

if(current>0){

current--;
loadQuestion();

}

}

function showResult(){

saveAnswer();

let score=0;

quizData.forEach((q,i)=>{

if(q.type==="single" &&
answers[i]===q.answer)
score++;

if(q.type==="fill" &&
(answers[i]||"").trim().toLowerCase()
===q.answer.toLowerCase())
score++;

if(q.type==="multi"){

if(JSON.stringify(answers[i]||[])
===JSON.stringify(q.answer))
score++;

}

});

document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("score").innerHTML=
`You scored ${score} out of ${quizData.length}`;

}

function restartQuiz(){

current=0;
answers=[];
timer=120;

document.getElementById("timer").innerText=timer;

document.getElementById("quiz").style.display="block";
document.getElementById("result").style.display="none";

loadQuestion();

}

setInterval(()=>{

timer--;

document.getElementById("timer").innerText=timer;

if(timer<=0)
showResult();

},1000);

loadQuestion();

</script>

</body>
</html>
